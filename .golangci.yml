version: "2"

linters:
  enable:
    # Bug detection
    - gocritic
    - gosec
    - nilerr
    - sqlclosecheck
    - bodyclose
    - durationcheck
    - exhaustive
    - noctx

    # Code simplification
    - goconst
    - unconvert
    - misspell
    - prealloc
    - revive

    # Duplication
    - dupl
    - dupword

    # Bug prevention
    - errorlint
    - fatcontext
    - copyloopvar
    - intrange

    # Modernization
    - modernize
    - exptostd

    # Magic numbers
    - mnd

    # Logging
    - loggercheck

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
    goconst:
      min-len: 5
      min-occurrences: 5
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-tags:
        - style
        - opinionated
        - experimental
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "10"
        - "100"
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: src/texture/
        linters:
          - gosec
        text: "G404"
      - path: src/render/
        linters:
          - mnd
      - path: _test\.go
        linters:
          - dupl
          - mnd
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
