version: "2"

linters:
  enable:
    # Bug detection
    - gocritic
    - gosec
    - nilerr
    - sqlclosecheck
    - bodyclose
    - durationcheck
    - exhaustive
    - noctx

    # Code simplification
    - goconst
    - unconvert
    - misspell
    - prealloc
    - revive

    # Logging
    - loggercheck

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
    goconst:
      min-len: 5
      min-occurrences: 5
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-tags:
        - style
        - opinionated
        - experimental
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
