version: "2"

linters:
  enable:
    # Bug detection
    - gocritic
    - gosec
    - nilerr
    - nilnesserr
    - nilnil
    - sqlclosecheck
    - bodyclose
    - durationcheck
    - exhaustive
    - makezero
    - noctx
    - unparam

    # Code simplification
    - goconst
    - unconvert
    - misspell
    - prealloc
    - revive
    - usestdlibvars

    # Duplication
    - dupl
    - dupword

    # Bug prevention
    - bidichk
    - errname
    - errorlint
    - fatcontext
    - copyloopvar
    - intrange
    - nonamedreturns
    - predeclared

    # Modernization
    - modernize
    - exptostd

    # Magic numbers
    - mnd

    # Logging
    - loggercheck

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
    goconst:
      min-len: 5
      min-occurrences: 5
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-tags:
        - style
        - opinionated
        - experimental
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "10"
        - "100"
    revive:
      enable-all-rules: true
      rules:
        - name: exported
          disabled: true
        - name: deep-exit
          disabled: true
        - name: var-naming
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: cognitive-complexity
          arguments: [25]
        - name: cyclomatic
          arguments: [25]
        - name: function-length
          arguments: [150, 0]
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: dot-imports
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: empty-lines
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: import-alias-naming
          disabled: true
        - name: confusing-results
          disabled: true
        - name: indent-error-flow
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: package-directory-mismatch
          disabled: true
        - name: identical-switch-branches
          disabled: true
        - name: useless-fallthrough
          disabled: true
        - name: package-naming
          disabled: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: src/texture/
        linters:
          - gosec
        text: "G404"
      - path: src/render/
        linters:
          - mnd
      - path: _test\.go
        linters:
          - dupl
          - mnd
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
